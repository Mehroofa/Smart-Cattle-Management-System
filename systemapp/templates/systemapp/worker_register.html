<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Worker Registration - FarmAI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#CC8899",
                        "primary-dark": "#a86b7a",
                        "background-light": "#F5F5F5",
                        "mocha": "#3E2723",
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: "Space Grotesk", sans-serif;
        }
    </style>
</head>

<body class="bg-background-light min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="{% url 'home' %}" class="inline-flex items-center gap-2 mb-6">
                <div class="flex items-center justify-center size-10 rounded-lg bg-primary text-white">
                    <span class="material-symbols-outlined">agriculture</span>
                </div>
                <h2 class="text-2xl font-bold tracking-tight">FarmAI</h2>
            </a>
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Worker Registration</h1>
            <p class="text-slate-500">Join the farm team and start managing daily tasks.</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="mb-4 p-3 rounded-lg text-sm font-medium
            {% if message.tags == 'success' %}bg-green-100 text-green-800
            {% elif message.tags == 'error' %}bg-red-100 text-red-800
            {% else %}bg-blue-100 text-blue-800{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
                    <input type="text" name="username" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm"
                        placeholder="Choose a username" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm"
                        placeholder="Create a strong password" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Role</label>
                    <select name="role"
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm bg-white">
                        <option value="General Worker">General Worker</option>
                        <option value="Feed Manager">Feed Manager</option>
                        <option value="Cleaning Staff">Cleaning Staff</option>
                        <option value="Field Operator">Field Operator</option>
                    </select>
                </div>
                <button type="submit"
                    class="w-full py-3.5 bg-primary text-white font-bold rounded-xl hover:bg-primary-dark transition-all active:scale-[0.98] flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
                    <span>Register as Worker</span>
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-slate-500 mt-6">
            Already have an account? <a href="{% url 'worker_login' %}"
                class="text-primary font-bold hover:underline">Sign
                In</a>
        </p>
        <p class="text-center text-sm text-slate-500 mt-2">
            <a href="{% url 'register_choice' %}" class="text-primary font-semibold hover:underline">← Back to role
                selection</a>
        </p>
    </div>
</body>

</html>
