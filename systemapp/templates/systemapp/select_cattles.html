<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Cattle for Report - VetCare AI</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#93C572",
            "background-light": "#EBF5F0",
            "background-dark": "#1a2111",
            "olive-subtle": "#000000",
            "beige-muted": "#f3f4f0"
          },
          fontFamily: { display: ["Manrope", "sans-serif"] }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
</head>
<body class="bg-background-light text-black min-h-screen font-display">
  <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-beige-muted px-6 py-3">
    <div class="max-w-[1440px] mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="bg-primary p-1.5 rounded-lg flex items-center justify-center">
          <span class="material-symbols-outlined text-white" style="font-variation-settings:'FILL' 1">database</span>
        </div>
        <h2 class="text-xl font-extrabold tracking-tight">VetCare AI</h2>
      </div>
      <a href="{% url 'select_farms' %}" class="text-sm font-semibold hover:text-primary">Back to Farms</a>
    </div>
  </header>

  <main class="max-w-[1440px] mx-auto p-6 lg:p-10">
    <div class="mb-8">
      <p class="text-sm font-bold text-primary">STEP 2 OF 4</p>
      <h1 class="text-4xl font-black leading-tight mt-2">Select Cattle for Report</h1>
      <p class="text-black/60 text-lg mt-1">Farm: <span class="font-semibold text-black">{{ farm.farm_name }}</span> • Report #{{ report.id }}</p>
    </div>

    <form method="post" class="space-y-8">
      {% csrf_token %}

      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
        {% for cattle in cattle_list %}
        <label class="block cursor-pointer">
          <input type="checkbox" name="cattle_ids" value="{{ cattle.id }}" class="peer sr-only"/>
          <div class="relative bg-white rounded-xl border border-beige-muted overflow-hidden shadow-sm hover:shadow-md transition-all peer-checked:border-2 peer-checked:border-primary">
            <div class="absolute top-3 right-3 z-10">
              <div class="bg-beige-muted text-black/60 p-1 rounded-full flex items-center justify-center peer-checked:bg-primary peer-checked:text-white">
                <span class="material-symbols-outlined text-lg">radio_button_unchecked</span>
              </div>
            </div>
            <div class="flex p-4 gap-4">
              <div class="w-20 h-20 rounded-lg overflow-hidden bg-slate-100 border border-beige-muted">
                {% if cattle.image %}
                <img src="{{ cattle.image.url }}" alt="{{ cattle.tag_id }}" class="w-full h-full object-cover" />
                {% else %}
                  {% if cattle.cattle_type == "BUFFALO" %}
                  <img alt="{{ cattle.tag_id }}" class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1500595046743-cd271d694d30?q=80&w=500&auto=format&fit=crop" />
                  {% else %}
                  <img alt="{{ cattle.tag_id }}" class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1545468800-85cc9bc6ecf7?q=80&w=500&auto=format&fit=crop" />
                  {% endif %}
                {% endif %}
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span class="px-2 py-0.5 bg-primary/10 text-primary text-[10px] font-bold rounded uppercase tracking-wider">{{ cattle.breed }}</span>
                  <span class="text-xs font-medium text-black/60">{{ cattle.cattle_type }}</span>
                </div>
                <h3 class="text-lg font-bold leading-none mb-2">Tag #{{ cattle.tag_id }}</h3>
                <div class="text-xs text-black/60 space-y-1">
                  <p class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">health_and_safety</span>Status: {{ cattle.health_status }}</p>
                  <p class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">schedule</span>Age: {{ cattle.age }} years</p>
                </div>
              </div>
            </div>
          </div>
        </label>
        {% empty %}
        <div class="col-span-full bg-white rounded-xl border border-beige-muted p-10 text-center">
          <p class="font-bold text-lg">No cattle available in this farm.</p>
        </div>
        {% endfor %}
      </div>

      <div class="pt-8 border-t border-beige-muted flex items-center justify-between">
        <a href="{% url 'select_farms' %}" class="flex items-center gap-2 px-6 py-3 text-black/70 font-bold hover:text-black transition-colors">
          <span class="material-symbols-outlined">arrow_back</span>
          Back to Farm Selection
        </a>
        <button type="submit" class="px-8 py-3 bg-primary text-slate-900 font-black rounded-lg hover:shadow-lg hover:scale-[1.02] transition-all flex items-center gap-3">
          Next: Record Findings
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>
    </form>
  </main>
</body>
</html>
