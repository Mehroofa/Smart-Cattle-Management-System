<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veterinarian Login | Cattle Farm System</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vetbg: '#F8F0C4',
            vetaccent: '#b79b2e'
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-vetbg flex items-center justify-center p-6">
  <main class="w-full max-w-5xl bg-white rounded-2xl shadow-xl overflow-hidden grid md:grid-cols-2">
    <section class="hidden md:flex relative">
      <img
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4JAs5vMWBEyaacYuco40EibFZmZkDdXTNLJaEIUzxYucsTLmbPoFPOrIXVUqxIIkDVm_6AnCctkBqXiDWAAT-CqnzmpMY59C4QzUDiNa-R-RgCDpw0CM8-PBLGg2hjH5cHGnRmwXBojIgvpuOqHb3HJMTonxU2-zL3_k5Vel0HpSE13KOxwR4h5fJivtQoDbFV1BXPavil7gqIfkLLFVnacPeiz3xHSf5q6l3cAPXpKR0i78-p9Z3gSTwUt0z9yRCozT-hpch"
        alt="Veterinarian portal banner"
        class="h-full w-full object-cover"
      />
      <div class="absolute inset-0 bg-black/35 flex items-center justify-center p-8">
        <h1 class="text-white text-3xl font-bold text-center">Veterinarian Verification Portal</h1>
      </div>
    </section>

    <section class="p-8 md:p-10">
      <p class="text-sm font-semibold text-vetaccent uppercase tracking-wide">Vet Access</p>
      <h2 class="mt-2 text-2xl font-bold text-gray-900">Sign in for verification</h2>
      <p class="mt-2 text-sm text-gray-600">Use your professional details to continue.</p>

      <form class="mt-8 space-y-5" method="post" action="#">
        <div>
          <label for="qualification" class="block text-sm font-medium text-gray-700">Professional Qualification</label>
          <select id="qualification" name="qualification" class="mt-1 block w-full rounded-lg border-gray-300 focus:border-vetaccent focus:ring-vetaccent">
            <option value="">Select your degree</option>
            <option>DVM</option>
            <option>BVSc</option>
            <option>MVSc</option>
            <option>PhD - Veterinary Medicine</option>
            <option>Licensed Veterinary Technician</option>
          </select>
        </div>

        <div>
          <label for="reg_no" class="block text-sm font-medium text-gray-700">Medical Registration Number</label>
          <input id="reg_no" name="reg_no" type="text" placeholder="e.g. VET-2024-9981" class="mt-1 block w-full rounded-lg border-gray-300 focus:border-vetaccent focus:ring-vetaccent" />
        </div>

        <div>
          <label for="specialty" class="block text-sm font-medium text-gray-700">Primary Area of Expertise</label>
          <select id="specialty" name="specialty" class="mt-1 block w-full rounded-lg border-gray-300 focus:border-vetaccent focus:ring-vetaccent">
            <option>Bovine Health &amp; Husbandry</option>
            <option>Livestock Reproduction</option>
            <option>Epidemiology &amp; Biosecurity</option>
            <option>Surgical Procedures</option>
            <option>Pathology</option>
          </select>
        </div>

        <div>
          <label for="certificate" class="block text-sm font-medium text-gray-700">Upload Certificate</label>
          <input id="certificate" name="certificate" type="file" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2" />
        </div>

        <button type="submit" class="w-full rounded-lg bg-vetaccent text-white py-3 font-semibold hover:opacity-90 transition">Submit for Verification</button>
      </form>
    </section>
  </main>
</body>
</html>
