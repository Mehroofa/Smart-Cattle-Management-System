<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-label="Farm worker with cattle illustration">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdecec"/>
      <stop offset="1" stop-color="#f3d0d0"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8efe9"/>
      <stop offset="1" stop-color="#d9e8df"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1200" fill="url(#sky)"/>
  <path d="M0,760 C250,690 460,640 720,680 C980,720 1160,680 1600,610 L1600,1200 L0,1200 Z" fill="url(#field)"/>
  <path d="M0,840 C260,770 520,760 820,810 C1120,860 1320,850 1600,790 L1600,1200 L0,1200 Z" fill="#cfe1d6" opacity="0.8"/>

  <!-- Sun glow -->
  <circle cx="1250" cy="240" r="160" fill="#fff3c4" opacity="0.9" filter="url(#soft)"/>

  <!-- Cow silhouette -->
  <g transform="translate(780,620)">
    <rect x="0" y="110" width="520" height="220" rx="110" fill="#1b1b1b"/>
    <rect x="420" y="140" width="210" height="160" rx="70" fill="#1b1b1b"/>
    <circle cx="570" cy="190" r="14" fill="#fefefe" opacity="0.55"/>
    <circle cx="610" cy="190" r="14" fill="#fefefe" opacity="0.55"/>
    <path d="M540,250 C580,280 610,280 650,250" fill="none" stroke="#fefefe" stroke-opacity="0.5" stroke-width="8" stroke-linecap="round"/>
    <rect x="90" y="300" width="70" height="220" rx="18" fill="#1b1b1b"/>
    <rect x="210" y="300" width="70" height="220" rx="18" fill="#1b1b1b"/>
    <rect x="340" y="300" width="70" height="220" rx="18" fill="#1b1b1b"/>
    <rect x="460" y="300" width="70" height="220" rx="18" fill="#1b1b1b"/>
    <circle cx="140" cy="170" r="40" fill="#fefefe" opacity="0.12"/>
    <circle cx="250" cy="230" r="34" fill="#fefefe" opacity="0.10"/>
    <circle cx="360" cy="165" r="28" fill="#fefefe" opacity="0.10"/>
    <circle cx="420" cy="240" r="45" fill="#fefefe" opacity="0.08"/>
  </g>

  <!-- Worker silhouette -->
  <g transform="translate(520,560)">
    <circle cx="140" cy="120" r="58" fill="#1b1b1b"/>
    <path d="M60,460 C85,320 105,220 140,190 C175,220 195,320 220,460" fill="#1b1b1b"/>
    <rect x="40" y="250" width="200" height="190" rx="80" fill="#1b1b1b"/>
    <rect x="35" y="450" width="70" height="220" rx="22" fill="#1b1b1b"/>
    <rect x="175" y="450" width="70" height="220" rx="22" fill="#1b1b1b"/>
    <rect x="-10" y="280" width="90" height="42" rx="20" fill="#1b1b1b"/>
    <rect x="200" y="280" width="90" height="42" rx="20" fill="#1b1b1b"/>
    <path d="M240,320 C320,340 390,380 450,440" fill="none" stroke="#1b1b1b" stroke-width="16" stroke-linecap="round"/>
    <path d="M450,440 C470,460 490,480 510,500" fill="none" stroke="#1b1b1b" stroke-width="16" stroke-linecap="round"/>
  </g>

  <!-- Foreground mist -->
  <rect width="1600" height="1200" fill="#ffffff" opacity="0.14"/>
</svg>

